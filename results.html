<!DOCTYPE html>
<html>
<head>
    <title>Quote Results</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 20px auto; }
        .result { background: #f5f5f5; padding: 20px; border-radius: 5px; }
        a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>
    <div class="result">
        <h2>Quote Received!</h2>
        <p><strong>Company:</strong> {{ result.company }}</p>
        <p><strong>Cost:</strong> ${{ "%.2f"|format(result.cost) }}</p>
        <p><strong>Services:</strong> {{ result.services }}</p>
        <p><strong>Delivery Days:</strong> {{ result.delivery_days }}</p>
        <a href="/compare?route={{ route }}">Compare Prices</a>
        <br><br>
        <a href="/">← New Quote</a>
    </div>
</body>
</html>
